<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System</title>
    <link rel="stylesheet" href="./solar1.css">
</head>
<body>

    <div class="container">
        <img src="https://cdn.mos.cms.futurecdn.net/HuGGeENt6kGyixe3hT9tnY.jpg" alt="space image">
        <div id="Sun"></div>
        <div class="circle mercury">
            <div id="planet1"></div>
        </div>
        <div class="circle venus">
            <div id="planet2"></div>
        </div>
        <div class="circle earth">
            <div id="planet3"></div>
        </div>
        <div class="circle mars">
            <div id="planet4"></div>
        </div>
        <div class="circle jupiter">
            <div id="planet5"></div>
        </div>
        <div class="circle saturn">
            <div id="planet6"></div>
        </div>
        <div class="circle uranus">
            <div id="planet7"></div>
        </div>
        <div class="circle neptune">
            <div id="planet8"></div>
        </div>
        <div class="circle pluto">
            <div id="planet9"></div>
        </div>
    </div>
    
</body>
</html>
